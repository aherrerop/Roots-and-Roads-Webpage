<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Guide Portal — Roots &amp; Roads</title>
<link rel="icon" type="image/png" href="/images/blackWhite_Logo_v2.png?v=1">
<style>
  /* ============ CONFIG: paste your deployed Web App URL below ============ */
  /* (Set in JS: PORTAL_URL) */

  :root{
    --bg:#f3f4f6; --card:#ffffff; --ink:#1a2b49; --muted:#63687a;
    --line:#e5e7eb; --brand:#ff5533; --blue:#0071eb; --green:#25d366;
    --paid:#0071eb; --free:#f59e0b; --danger:#dc2626; --ok:#16a34a;
    --radius:14px; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.4}
  .wrap{max-width:560px;margin:0 auto;padding:16px 14px 64px}
  .hidden{display:none!important}

  /* header */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin:6px 2px 14px}
  .topbar h1{font-size:26px;font-weight:800;margin:0;letter-spacing:-.5px}
  .topbar .who{font-size:13px;color:var(--muted)}
  .iconbtn{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:6px 8px;border-radius:8px}
  .iconbtn:hover{background:#eef0f3}

  .tabs{display:flex;gap:8px;margin:0 2px 14px}
  .tab{flex:1;text-align:center;padding:9px;border-radius:10px;background:#e9ebef;color:var(--muted);
    font-weight:600;cursor:pointer;border:none;font-size:14px}
  .tab.active{background:var(--ink);color:#fff}

  /* login */
  .login{max-width:380px;margin:8vh auto 0;background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:26px 22px}
  .login h2{margin:0 0 4px;font-size:22px}
  .login p{margin:0 0 18px;color:var(--muted);font-size:14px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px}
  .field input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;background:var(--ink);color:#fff;
    font-weight:700;font-size:15px;cursor:pointer}
  .btn:disabled{opacity:.6;cursor:default}
  .btn.green{background:var(--green)}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:16px}

  /* day + tour cards */
  .dayhdr{margin:20px 4px 8px;display:flex;align-items:baseline;justify-content:space-between}
  .dayhdr .d{font-size:17px;font-weight:800}
  .dayhdr .m{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px}
  .dayhdr .badge{font-size:11px;font-weight:800;color:var(--blue)}

  .tour{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
  .tour .head{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;border-left:4px solid var(--blue)}
  .tour .time{font-weight:800;font-size:15px;min-width:52px}
  .tour .flag{font-size:16px}
  .tour .lang{font-size:13px;font-weight:600;color:var(--muted)}
  .tour .spacer{flex:1}
  .tour .count{font-weight:800;font-size:15px}
  .tour .count small{font-weight:600;color:var(--muted)}
  .tour .miss{color:var(--danger);font-size:11px;font-weight:700;text-align:right}
  .tour .co{font-size:11px;color:var(--muted);padding:0 14px 8px 66px;margin-top:-4px}

  .bookings{border-top:1px solid var(--line);padding:6px 12px 12px}
  .bk{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid #f1f2f4}
  .bk:last-child{border-bottom:none}
  .bk .nm{flex:1;min-width:0}
  .bk .nm b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .src{display:inline-block;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;color:#fff;margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
  .src.paid{background:var(--paid)} .src.free{background:var(--free)}
  .wa{color:var(--green);font-size:20px;text-decoration:none}
  .ph{color:var(--muted);font-size:12px;text-decoration:none}

  .stepper{display:flex;align-items:center;gap:6px}
  .stepper button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:#fff;font-size:18px;line-height:1;cursor:pointer;color:var(--ink)}
  .stepper .val{min-width:34px;text-align:center;font-weight:800}
  .stepper .of{color:var(--muted);font-weight:600;font-size:12px}

  .walkins{padding:8px 6px 2px;border-top:1px dashed var(--line);margin-top:4px}
  .walkins .wl{display:flex;align-items:center;gap:8px;padding:6px 4px}
  .walkins .wl .lbl{flex:1;font-size:13px;color:var(--muted)}

  .savebar{display:flex;gap:8px;align-items:center;padding:10px 12px 12px}
  .savebar .msg{flex:1;font-size:12px;color:var(--ok)}
  .savebar .btn{width:auto;padding:10px 20px}

  /* schedule table */
  .sched{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .sched table{width:100%;border-collapse:collapse;font-size:13px}
  .sched th,.sched td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--line)}
  .sched th{background:#f8fafc;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
  .sched td.miss{color:var(--danger);font-weight:700}
  .empty{text-align:center;color:var(--muted);padding:40px 10px}
  .spin{text-align:center;color:var(--muted);padding:40px}
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <div id="loginView" class="login">
    <h2>Guide Portal</h2>
    <p>Roots &amp; Roads — sign in to see your tours.</p>
    <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" inputmode="email"></div>
    <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password"></div>
    <button id="loginBtn" class="btn">Sign in</button>
    <div id="loginErr" class="err"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashView" class="hidden">
    <div class="topbar">
      <div><h1>Tours</h1><div id="who" class="who"></div></div>
      <button id="logoutBtn" class="iconbtn">Log out</button>
    </div>
    <div class="tabs">
      <button id="tabTours" class="tab active">My tours</button>
      <button id="tabSched" class="tab">All guides</button>
    </div>
    <div id="toursPane"><div class="spin">Loading…</div></div>
    <div id="schedPane" class="hidden"></div>
  </div>

</div>

<script>
/* ================== CONFIG ================== */
/* After deploying guidePortal.gs as a Web App, paste its /exec URL here: */
const PORTAL_URL = "https://script.google.com/macros/s/AKfycbxzl4w3VSVj4Tln9H3hcjuNZ_Z7J8zu7iI5ZPq9P4Ag6rZ19-XYgx_qWjFLohAa7iEf/exec";

/* ================== JSONP ================== */
function api(action, params){
  return new Promise((resolve,reject)=>{
    const cb = "cb_"+Math.random().toString(36).slice(2);
    const q = Object.assign({action, callback:cb}, params||{});
    const url = PORTAL_URL + "?" + Object.keys(q)
      .map(k=>encodeURIComponent(k)+"="+encodeURIComponent(q[k])).join("&");
    const s = document.createElement("script");
    let done=false;
    window[cb]=(data)=>{ done=true; cleanup(); resolve(data); };
    function cleanup(){ delete window[cb]; s.remove(); }
    s.onerror=()=>{ if(!done){cleanup(); reject(new Error("Network error"));} };
    s.src=url; document.body.appendChild(s);
    setTimeout(()=>{ if(!done){cleanup(); reject(new Error("Timed out"));} }, 20000);
  });
}

/* ================== STATE ================== */
const store = {
  get token(){ return sessionStorage.getItem("rr_token"); },
  set token(v){ v?sessionStorage.setItem("rr_token",v):sessionStorage.removeItem("rr_token"); },
  get name(){ return sessionStorage.getItem("rr_name")||""; },
  set name(v){ sessionStorage.setItem("rr_name",v||""); }
};
let RATES = {paid:10, free:6};
let DIRTY = {}; // tourId -> true when edited

const FLAGS = {English:"🇬🇧",Spanish:"🇪🇸",German:"🇩🇪",French:"🇫🇷",Italian:"🇮🇹",Portuguese:"🇵🇹",Catalan:"🏴"};
const flag = l => FLAGS[l] || "🌐";
const digits = p => String(p||"").replace(/[^\d]/g,"");
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ================== LOGIN ================== */
const $ = id => document.getElementById(id);

$("loginBtn").onclick = doLogin;
$("password").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });

async function doLogin(){
  const email=$("email").value.trim(), password=$("password").value;
  if(!email||!password){ $("loginErr").textContent="Enter email and password."; return; }
  $("loginBtn").disabled=true; $("loginErr").textContent="";
  try{
    const r = await api("login",{email,password});
    if(!r.ok){ $("loginErr").textContent=r.error||"Login failed"; $("loginBtn").disabled=false; return; }
    store.token=r.token; store.name=r.guide.name;
    showDash();
  }catch(err){ $("loginErr").textContent=err.message; $("loginBtn").disabled=false; }
}

$("logoutBtn").onclick = ()=>{ store.token=""; location.reload(); };

/* ================== TABS ================== */
$("tabTours").onclick=()=>switchTab("tours");
$("tabSched").onclick=()=>switchTab("sched");
function switchTab(t){
  $("tabTours").classList.toggle("active",t==="tours");
  $("tabSched").classList.toggle("active",t==="sched");
  $("toursPane").classList.toggle("hidden",t!=="tours");
  $("schedPane").classList.toggle("hidden",t!=="sched");
}

/* ================== DASHBOARD ================== */
function showDash(){
  $("loginView").classList.add("hidden");
  $("dashView").classList.remove("hidden");
  $("who").textContent = store.name;
  loadTours();
}

async function loadTours(){
  $("toursPane").innerHTML='<div class="spin">Loading…</div>';
  let r;
  try{ r = await api("tours",{token:store.token}); }
  catch(err){ $("toursPane").innerHTML='<div class="empty">'+esc(err.message)+'</div>'; return; }
  if(!r.ok){
    if(/expired/i.test(r.error||"")){ store.token=""; location.reload(); return; }
    $("toursPane").innerHTML='<div class="empty">'+esc(r.error||"Error")+'</div>'; return;
  }
  RATES = r.rates || RATES;
  renderTours(r.tours||[]);
  renderSchedule(r.schedule||[]);
}

function renderTours(tours){
  const pane=$("toursPane");
  if(!tours.length){ pane.innerHTML='<div class="empty">No upcoming tours assigned to you.</div>'; return; }
  // group by day
  const groups={};
  tours.forEach(t=>{ (groups[t.dateKey]=groups[t.dateKey]||{dateText:t.dateText,day:t.day,items:[]}).items.push(t); });
  const todayKey = new Date().toISOString().slice(0,10);
  const tomKey = new Date(Date.now()+864e5).toISOString().slice(0,10);
  let html="";
  Object.keys(groups).sort().forEach(dk=>{
    const g=groups[dk];
    const rel = dk===todayKey?'<span class="badge">TODAY</span>' : dk===tomKey?'<span class="badge">TOMORROW</span>' : '';
    const [dow,mon]=[g.day, g.dateText];
    html += '<div class="dayhdr"><div><span class="d">'+esc(g.day)+' '+esc(g.dateText.replace(/^[A-Za-z]+,\s*/,''))+'</span></div>'+rel+'</div>';
    g.items.forEach(t=> html += tourCard(t));
  });
  pane.innerHTML=html;
  bindTourCards(tours);
}

function tourCard(t){
  const miss = t.status && t.status!=="OK";
  const co = t.coGuides && t.coGuides.length ? '<div class="co">With: '+esc(t.coGuides.join(", "))+'</div>' : '';
  let bk = t.bookings.map((b,i)=>bookingRow(t.id,b,i)).join("");
  if(!t.bookings.length) bk='<div class="empty" style="padding:16px">No bookings yet.</div>';
  // walk-in rows: one per distinct source present (or a generic one)
  const srcSet = Array.from(new Set(t.bookings.map(b=>b.source))).filter(Boolean);
  if(!srcSet.length) srcSet.push("Website");
  const walk = srcSet.map(s=>{
    const paid = t.bookings.find(b=>b.source===s)?.paid ?? false;
    return '<div class="wl"><span class="lbl">Walk-in ('+esc(s)+')</span>'+stepper(t.id,"walk|"+s,0,99,0)+'</div>';
  }).join("");
  return ''+
  '<div class="tour" data-tour="'+esc(t.id)+'">'+
    '<div class="head js-toggle" style="border-left-color:'+(miss?'#dc2626':'#0071eb')+'">'+
      '<span class="time">'+esc(t.timeLabel||t.time)+'</span>'+
      '<span class="flag">'+flag(t.language)+'</span>'+
      '<span class="lang">'+esc(t.language)+'</span>'+
      '<span class="spacer"></span>'+
      '<span class="count" data-count="'+esc(t.id)+'"><span class="ck">'+t.checkedGuests+'</span> <small>/ '+t.bookedGuests+'</small></span>'+
    '</div>'+ co +
    '<div class="bookings">'+ bk +
      '<div class="walkins">'+ walk +'</div>'+
      '<div class="savebar"><span class="msg" data-msg="'+esc(t.id)+'"></span>'+
        '<button class="btn green js-save" data-tour="'+esc(t.id)+'">Save check-ins</button></div>'+
    '</div>'+
  '</div>';
}

function bookingRow(tourId,b,i){
  const wa = digits(b.phone) ? '<a class="wa" target="_blank" href="https://wa.me/'+digits(b.phone)+'">🟢</a>' : '';
  const ph = b.phone ? '<a class="ph" href="tel:'+esc(b.phone)+'">'+esc(b.phone)+'</a>' : '';
  return '<div class="bk">'+
    '<div class="nm"><b>'+esc(b.name||"—")+'</b>'+
      '<span class="src '+(b.paid?'paid':'free')+'">'+esc(b.source||"?")+'</span> '+ph+'</div>'+
    wa+
    stepper(tourId,"bk|"+i,b.checkedIn,b.guests,b.guests)+
  '</div>';
}

function stepper(tourId,ref,val,max,total){
  return '<div class="stepper" data-ref="'+esc(ref)+'" data-tour="'+esc(tourId)+'" data-max="'+max+'">'+
    '<button class="js-dec">−</button>'+
    '<span class="val">'+val+'</span>'+
    (total?'<span class="of">/'+total+'</span>':'')+
    '<button class="js-inc">+</button></div>';
}

let TOURS_CACHE=[];
function bindTourCards(tours){
  TOURS_CACHE=tours;
  document.querySelectorAll(".js-toggle").forEach(h=>{
    h.onclick=()=>{ const b=h.parentElement.querySelector(".bookings"); b.style.display = b.style.display==="none"?"":"none"; };
  });
  // collapse all but today by default
  document.querySelectorAll(".tour .bookings").forEach(b=>b.style.display="none");
  document.querySelectorAll(".stepper").forEach(st=>{
    const dec=st.querySelector(".js-dec"), inc=st.querySelector(".js-inc"), val=st.querySelector(".val");
    const max=Number(st.dataset.max);
    dec.onclick=()=>{ let v=Math.max(0,Number(val.textContent)-1); val.textContent=v; onEdit(st.dataset.tour); recount(st.dataset.tour); };
    inc.onclick=()=>{ let v=Math.min(max,Number(val.textContent)+1); val.textContent=v; onEdit(st.dataset.tour); recount(st.dataset.tour); };
  });
  document.querySelectorAll(".js-save").forEach(btn=>{ btn.onclick=()=>saveTour(btn.dataset.tour,btn); });
}

function recount(tourId){
  const card=document.querySelector('.tour[data-tour="'+cssq(tourId)+'"]');
  let sum=0;
  card.querySelectorAll('.stepper[data-ref^="bk|"] .val').forEach(v=>sum+=Number(v.textContent));
  card.querySelector('[data-count] .ck').textContent=sum;
}
function onEdit(tourId){ DIRTY[tourId]=true; }
function cssq(s){ return String(s).replace(/"/g,'\\"'); }

async function saveTour(tourId,btn){
  const t=TOURS_CACHE.find(x=>x.id===tourId); if(!t) return;
  const card=document.querySelector('.tour[data-tour="'+cssq(tourId)+'"]');
  const bookings=t.bookings.map((b,i)=>{
    const st=card.querySelector('.stepper[data-ref="bk|'+i+'"] .val');
    return {bookingId:b.bookingId,source:b.source,name:b.name,phone:b.phone,guests:b.guests,checkedIn:Number(st?st.textContent:b.checkedIn)};
  });
  const walkins=[];
  card.querySelectorAll('.stepper[data-ref^="walk|"]').forEach(st=>{
    const source=st.dataset.ref.split("|")[1]; const count=Number(st.querySelector(".val").textContent);
    if(count>0) walkins.push({source,count});
  });
  const data={dateKey:t.dateKey,time:t.time,timeLabel:t.timeLabel,day:t.day,language:t.language,bookings,walkins};
  const msg=card.querySelector('[data-msg]');
  btn.disabled=true; msg.style.color="var(--muted)"; msg.textContent="Saving…";
  try{
    const r=await api("save",{token:store.token,data:JSON.stringify(data)});
    if(r.ok){ msg.style.color="var(--ok)"; msg.textContent="Saved ✓"; DIRTY[tourId]=false; }
    else{ msg.style.color="var(--danger)"; msg.textContent=r.error||"Error"; }
  }catch(err){ msg.style.color="var(--danger)"; msg.textContent=err.message; }
  btn.disabled=false;
  setTimeout(()=>{ if(!DIRTY[tourId]) msg.textContent=""; },4000);
}

/* ================== ALL-GUIDES SCHEDULE ================== */
function renderSchedule(rows){
  const pane=$("schedPane");
  if(!rows.length){ pane.innerHTML='<div class="empty">No upcoming schedule.</div>'; return; }
  let html='<div class="sched"><table><thead><tr><th>Date</th><th>Time</th><th>Lang</th><th>Guides</th></tr></thead><tbody>';
  rows.forEach(s=>{
    const miss = s.status && s.status!=="OK";
    html+='<tr><td>'+esc(s.day.slice(0,3))+' '+esc(s.dateText.replace(/^[A-Za-z]+,\s*/,''))+'</td>'+
      '<td>'+esc(to12(s.time))+'</td><td>'+flag(s.language)+'</td>'+
      '<td class="'+(miss?'miss':'')+'">'+(esc(s.assigned.join(", "))|| (miss?'MISSING':''))+'</td></tr>';
  });
  html+='</tbody></table></div>';
  pane.innerHTML=html;
}
function to12(t){ const m=String(t).match(/^(\d{1,2}):(\d{2})$/); if(!m) return t; let h=+m[1]; const s=h>=12?'PM':'AM'; h=((h+11)%12)+1; return h+':'+m[2]+' '+s; }

/* ================== BOOT ================== */
if(PORTAL_URL.indexOf("PASTE_")===0){
  $("loginErr").textContent="Portal not configured yet (PORTAL_URL).";
}
if(store.token){ showDash(); }
</script>
</body>
</html>
